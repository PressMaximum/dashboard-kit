name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    name: Lint + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      # Token gate (GATE B) — bridge mapping + resolution check against the
      # committed fixtures in tests/vr/fixtures/ (no aponto checkout needed).
      # Platform-independent: it asserts computed values in a synthetic DOM,
      # not screenshots. check-bridge-sync self-skips on CI (no aponto path).
      #
      # NOTE (deliberate): the pixel gate (GATE A — tests/vr/capture.mjs +
      # compare.mjs vs tests/vr/baseline/) is NOT wired into CI. The baseline
      # PNGs are rendered on the founder's macOS machine; font rendering and
      # antialiasing differ per platform, so a Linux runner would diff every
      # shot. Gate A runs locally — see tests/vr/README.md.
      - name: Install Playwright Chromium (token gate)
        run: npx playwright install --with-deps chromium

      - name: Token gate (bridge mapping + resolution)
        run: |
          node tests/vr/verify-tokens.mjs
          node tests/vr/check-bridge-sync.mjs

      - name: Bundle size
        run: npm run size

      - name: Upload build artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build/
          retention-days: 7

  php:
    name: PHP composer
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer:v2
          coverage: none

      - name: Validate composer.json
        run: composer validate --no-check-publish --strict

      - name: Install composer deps
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPUnit
        run: composer test
